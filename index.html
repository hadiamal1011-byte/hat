<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моей любви ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Летающие сердечки -->
<div id="hearts"></div>

<!-- ===================== -->
<!-- ПЕРВЫЙ ЭКРАН -->
<!-- ===================== -->

<section id="screen1" class="screen active">

    <div class="content">

        <h1>
            Ты готова,<br>
            моя любовь?🙂
        </h1>

        <button id="readyBtn" class="btn">
            Готова
        </button>

        <p class="thanks">
            Спасибо за всё ❤️
        </p>

    </div>

</section>

<!-- ===================== -->
<!-- ВТОРОЙ ЭКРАН -->
<!-- ===================== -->

<section id="screen2" class="screen">

    <div class="content">

        <h2>
            Жонушка ❤️
        </h2>

        <div id="typingText" class="typing"></div>

        <button id="talkBtn" class="btn hidden">
            Давай поговорим
        </button>

    </div>

</section>

<!-- ===================== -->
<!-- ТРЕТИЙ ЭКРАН -->
<!-- ===================== -->

<section id="screen3" class="screen">

    <div class="content">

        <div class="envelope">

            <div class="letter">

                <div class="mail">💌</div>

                <h2>Письмо</h2>

                <p>

                    Если хочешь поговорить,
                    напиши. ❤️

                    <br><br>

                    До конца дня дай мне знать.

                    <br><br>

                    Если ты больше не хочешь
                    продолжать наши отношения —
                    отпусти меня.

                    <br><br>

                    Какое бы решение
                    ты ни приняла,
                    я приму его.

                    <br><br>

                    Береги себя ❤️

                </p>

            </div>

        </div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
